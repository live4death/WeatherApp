                <i class="fas fa-magnifying-glass search-icon-abs"></i>            
            </div>
        </div>

<div class="weather-widget">
    <div class="day-column active">
        <div class="header">
            <div class="day-name">MA</div>
            <div class="date">Astăzi</div>
        </div>
        <div class="weather-box">
            ⛅
        </div>
        <div class="details-box">
            <div class="temp-badge temp-high">15 °C</div>
            <div class="temp-badge temp-low">1 °C</div>
            <div class="stat-row">↙ 6 km/h</div>
        </div>
    </div>

    <div class="day-column">
        <div class="header">
            <div class="day-name">MI</div>
            <div class="date">Mâine</div>
        </div>
        <div class="weather-box">
            🌤️
        </div>
        <div class="details-box">
            <div class="temp-badge temp-high">15 °C</div>
            <div class="temp-badge temp-low">2 °C</div>
            <div class="stat-row">⬅ 5 km/h</div>
        </div>
    </div>

    <div class="day-column">
        <div class="header">
            <div class="day-name">JO</div>
            <div class="date">5/3</div>
        </div>
        <div class="weather-box">
            ⛅
        </div>
        <div class="details-box">
            <div class="temp-badge temp-high">16 °C</div>
            <div class="temp-badge temp-low">4 °C</div>
            <div class="stat-row">↘ 7 km/h</div>

        </div>
    </div>

    <div class="day-column">
        <div class="header">
            <div class="day-name">VI</div>
            <div class="date">6/3</div>
        </div>
        <div class="weather-box">
            ☀️
        </div>
        <div class="details-box">
            <div class="temp-badge temp-high">15 °C</div>
            <div class="temp-badge temp-low">3 °C</div>
            <div class="stat-row">⬇ 11 km/h</div>

        </div>
    </div>

    <div class="day-column">
        <div class="header">
            <div class="day-name">SB</div>
            <div class="date">7/3</div>
        </div>
        <div class="weather-box">
            ☀️
        </div>
        <div class="details-box">
            <div class="temp-badge temp-high">15 °C</div>
            <div class="temp-badge temp-low">2 °C</div>
        </div>
    </div>
</div>


        <div class="bottom-row">

            <div class="details">
